name: tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  server:
    name: relay server (${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: install
        working-directory: server
        run: npm ci
      - name: test
        working-directory: server
        run: npm test

  extension:
    name: chrome extension (${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - name: install (server deps for relay fixture)
        working-directory: server
        run: npm ci
      - name: install
        working-directory: extension
        run: npm ci
      - name: test
        working-directory: extension
        run: npm test
